name: Upload to charsiujai.com

on:
  push:
    paths:
      - 'data/**'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload changed JSON files
        env:
          UPLOAD_TOKEN: ${{ secrets.CBJ_UPLOAD_TOKEN }}
          UPLOAD_URL: https://charsiujai.com/_upload.php
        run: |
          set +e
          for file in data/*.json; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            # Write base64 to temp file, use --data-urlencode to handle +/= correctly
            b64file=$(mktemp)
            base64 -w0 "$file" > "$b64file"
            resp=$(curl -s --max-time 15 -X POST "$UPLOAD_URL" \
              --data-urlencode "token=${UPLOAD_TOKEN}" \
              --data-urlencode "file=${filename}" \
              --data-urlencode "data@${b64file}")
            echo "[$filename] $resp"
            rm -f "$b64file"
          done
